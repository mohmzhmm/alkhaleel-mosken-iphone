<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>مواقيت مسجد الخليل</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الخليل">
<meta name="theme-color" content="#0a1628">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===================== RESET & ROOT ===================== */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: none !important;
  text-size-adjust: none !important;
}
:root {
  font-size: 13px !important;

  /* ألوان الوضع الليلي (افتراضي) */
  --bg1: #0a1628;
  --bg2: #0d2137;
  --bg3: #112943;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.08);
  --card-active-bg: rgba(74,222,128,0.12);
  --card-active-border: rgba(74,222,128,0.5);
  --gold: #f0b429;
  --gold-light: #fcd34d;
  --green: #4ade80;
  --green-dark: #16a34a;
  --text: #f1f5f9;
  --text-dim: rgba(241,245,249,0.45);
  --text-muted: rgba(241,245,249,0.25);
  --accent: #38bdf8;
  --glow-green: rgba(74,222,128,0.25);
  --glow-gold: rgba(240,180,41,0.3);
  --shadow: rgba(0,0,0,0.4);
}

/* الوضع النهاري */
body.day-mode {
  --bg1: #e8f4f0;
  --bg2: #d4ebdf;
  --bg3: #c0e2cf;
  --card-bg: rgba(255,255,255,0.65);
  --card-border: rgba(22,163,74,0.15);
  --card-active-bg: rgba(22,163,74,0.12);
  --card-active-border: rgba(22,163,74,0.6);
  --text: #0f2d1a;
  --text-dim: rgba(15,45,26,0.55);
  --text-muted: rgba(15,45,26,0.3);
  --shadow: rgba(0,0,0,0.12);
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Cairo', sans-serif;
  color: var(--text);
  transition: background 0.6s ease;
}

body {
  background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left: env(safe-area-inset-left, 0px);
  padding-right: env(safe-area-inset-right, 0px);
}

/* نمط هندسي خفيف في الخلفية */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(74,222,128,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(56,189,248,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ===================== HEADER ===================== */
.header {
  position: relative;
  z-index: 10;
  padding: 10px 14px 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}

.header-left, .header-right {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.header-right { align-items: flex-end; }

.date-main {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
}

.date-hijri {
  font-size: 0.82rem;
  color: var(--gold);
  font-weight: 600;
}

.header-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.clock {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  text-shadow: 0 0 20px var(--glow-green);
}

.day-toggle {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.75rem;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  transition: all 0.3s;
}

.day-toggle:active { transform: scale(0.95); }

/* ===================== TABS ===================== */
.main-tabs {
  position: relative;
  z-index: 10;
  display: flex;
  background: transparent;
  padding: 0 10px;
  gap: 4px;
  flex-shrink: 0;
  margin-bottom: 0px;
}

.main-tab {
  flex: 1;
  padding: 6px 0 4px;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.25s ease;
  font-family: 'Cairo', sans-serif;
  letter-spacing: 0.3px;
}

.main-tab.active {
  color: var(--green);
  border-bottom-color: var(--green);
}

/* ===================== TAB CONTENT ===================== */
.tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-content.active { display: flex; }

/* ===================== COUNTDOWN ===================== */
.countdown-wrap {
  position: relative;
  z-index: 10;
  margin: 4px 12px;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
}

.countdown-card {
  max-width: 360px;
  width: 100%;
}

.countdown-card {
  background: var(--card-active-bg);
  border: 1px solid var(--card-active-border);
  border-radius: 18px;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  backdrop-filter: blur(20px);
  box-shadow: 0 4px 24px var(--shadow), 0 0 0 1px var(--card-active-border);
  transition: all 0.5s ease;
  max-width: 400px;
  width: 100%;
  text-align: center;
}

.countdown-card.iqama-mode {
  background: rgba(240,180,41,0.12);
  border-color: rgba(240,180,41,0.5);
  animation: iqamaPulse 2.5s ease-in-out infinite;
}

@keyframes iqamaPulse {
  0%, 100% { box-shadow: 0 4px 24px var(--shadow); }
  50% { box-shadow: 0 4px 40px rgba(240,180,41,0.3); }
}



/* Countdown Info */
.countdown-info { width: 100%; text-align: center; }

.countdown-label {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 2px;
}

.countdown-timer {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--green);
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  text-shadow: 0 0 20px var(--glow-green);
}

.countdown-card.iqama-mode .countdown-timer { color: var(--gold); text-shadow: 0 0 20px var(--glow-gold); }

.countdown-prayer-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.countdown-prayer-sv {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-weight: 400;
}

/* ===================== PRAYER CARDS ===================== */
.prayers-grid {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 4px 10px 8px;
  flex: 1;
  overflow: hidden;
  align-content: stretch;
  min-height: 0;
}

.prayer-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 6px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  text-align: center;
  place-content: center;
  backdrop-filter: blur(16px);
  box-shadow: 0 2px 12px var(--shadow);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}

.prayer-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: transparent;
  border-radius: 18px 18px 0 0;
  transition: all 0.4s;
}

.prayer-card.active-card {
  background: var(--card-active-bg);
  border-color: var(--card-active-border);
  box-shadow: 0 0 20px var(--glow-green), 0 4px 16px var(--shadow);
  transform: translateY(-2px) scale(1.02);
}

.prayer-card.active-card::before {
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

.prayer-card.passed {
  opacity: 0.38;
}



.prayer-name-ar {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}

.active-card .prayer-name-ar { color: var(--green); }

.prayer-name-sv {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.prayer-time {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.active-card .prayer-time { color: #fff; }



/* ===================== ADHKAR ===================== */
.adhkar-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.adhkar-subtabs {
  display: flex;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
  margin-bottom: 8px;
}

.adhkar-subtab {
  flex: 1;
  padding: 7px 0;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  background: var(--card-bg);
  transition: all 0.25s;
  font-family: 'Cairo', sans-serif;
}

.adhkar-subtab.active {
  color: var(--green);
  border-color: var(--card-active-border);
  background: var(--card-active-bg);
}

.adhkar-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  display: none;
}

.adhkar-list.active { display: block; }

.adhkar-list::-webkit-scrollbar { width: 3px; }
.adhkar-list::-webkit-scrollbar-track { background: transparent; }
.adhkar-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

.dhikr-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 12px 14px;
  margin-bottom: 8px;
  backdrop-filter: blur(16px);
  transition: all 0.2s;
}

.dhikr-card.completed {
  opacity: 0.5;
  border-color: var(--green);
}

.dhikr-text {
  font-family: 'Amiri', serif;
  font-size: 1.2rem;
  line-height: 2;
  color: var(--text);
  text-align: right;
  direction: rtl;
  margin-bottom: 10px;
}

.dhikr-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

.dhikr-source {
  font-size: 0.7rem;
  color: var(--gold);
  font-weight: 600;
  flex: 1;
  line-height: 1.4;
}

.dhikr-counter {
  display: flex;
  align-items: center;
  gap: 6px;
}

.dhikr-count-display {
  font-size: 0.85rem;
  font-weight: 900;
  color: var(--green);
  min-width: 28px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.dhikr-btn {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  border: 1px solid var(--card-active-border);
  background: var(--card-active-bg);
  color: var(--green);
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Cairo', sans-serif;
  line-height: 1;
}

.dhikr-btn:active {
  transform: scale(0.88);
  background: rgba(74,222,128,0.25);
}

.dhikr-btn.done {
  border-color: var(--gold);
  background: rgba(240,180,41,0.12);
  color: var(--gold);
}

/* ===================== NOTIFICATIONS ===================== */
.notif-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.notif-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px 10px;
  flex-shrink: 0;
}

.notif-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}

.notif-clear-btn {
  background: rgba(248,113,113,0.12);
  border: 1px solid rgba(248,113,113,0.3);
  color: rgba(248,113,113,0.9);
  border-radius: 10px;
  padding: 4px 10px;
  font-size: 0.6rem;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  font-weight: 600;
}

.notif-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
}

.notif-empty {
  text-align: center;
  color: var(--text-muted);
  margin-top: 50px;
  font-size: 0.85rem;
  line-height: 2;
}

.notif-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  direction: rtl;
}

.notif-card-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.notif-card-body {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 6px;
}

.notif-card-time {
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* ===================== IQAMA OVERLAY ===================== */
#prayer-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #001a0d 0%, #003320 50%, #001a0d 100%);
  z-index: 1000;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 16px;
}

#prayer-overlay.show { display: flex; }

.overlay-star {
  font-size: 3rem;
  animation: spinStar 8s linear infinite;
}

@keyframes spinStar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.overlay-title {
  font-family: 'Amiri', serif;
  font-size: 3rem;
  color: var(--green);
  text-shadow: 0 0 40px var(--glow-green);
  line-height: 1.2;
}

.overlay-sub {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.6);
}

/* ===================== SCROLLBAR ===================== */
.notif-list::-webkit-scrollbar { width: 3px; }
.notif-list::-webkit-scrollbar-track { background: transparent; }
.notif-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

/* ===================== ANIMATIONS ===================== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.prayer-card { animation: fadeInUp 0.4s ease both; }
.prayer-card:nth-child(1) { animation-delay: 0.05s; }
.prayer-card:nth-child(2) { animation-delay: 0.10s; }
.prayer-card:nth-child(3) { animation-delay: 0.15s; }
.prayer-card:nth-child(4) { animation-delay: 0.20s; }
.prayer-card:nth-child(5) { animation-delay: 0.25s; }
.prayer-card:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>

// ===== الوضع الليلي/النهاري =====
let dayMode = false;

function toggleDayMode() {
  dayMode = !dayMode;
  document.body.classList.toggle('day-mode', dayMode);
}

function autoDetectDayMode() {
  const h = new Date().getHours();
  dayMode = (h >= 6 && h < 19);
  document.body.classList.toggle('day-mode', dayMode);
}

// ===== بيانات اليوم =====
function getTodayStr() {
  const n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0') + ' 00:00:00';
}

function getTodayData() {
  return prayerData.find(d => d.Datum === getTodayStr());
}

function addMins(t, m) {
  if (!t || t === '-') return '-';
  const [h,mn] = t.split(':').map(Number);
  const d = new Date(); d.setHours(h); d.setMinutes(mn + m);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function parseTime(datum, timeStr) {
  const [y,mo,d] = datum.split(' ')[0].split('-');
  const [h,m] = timeStr.split(':');
  return new Date(y, mo-1, d, h, m, 0);
}

// ===== بناء البطاقات =====
function buildCards() {
  const td = getTodayData();
  const container = document.getElementById('prayer-cards');
  container.innerHTML = '';
  prayers.forEach(p => {
    const t = td ? td[p.key] : '--:--';
    const iq = (p.hasIqama && td) ? addMins(t, iqamaOffsets[p.key] || 0) : null;
    const card = document.createElement('div');
    card.className = 'prayer-card';
    card.id = 'card-' + p.key;
    card.innerHTML = `
      <div class="prayer-icon">${p.icon}</div>
      <div class="prayer-name-ar">${p.ar}</div>
      <div class="prayer-name-sv">${p.sv}</div>
      <div class="prayer-time" id="ptime-${p.key}">${t}</div>

    `;
    container.appendChild(card);
  });
}

function updateClock() {
  const now = new Date();
  const hijriAr = {calendar:'islamic-umalqura', day:'numeric', month:'long', year:'numeric'};
  document.getElementById('date-hijri').innerText = now.toLocaleDateString('ar-SA-u-nu-latn', hijriAr);

  let hijriSv = now.toLocaleDateString('sv-SE', {calendar:'islamic-umalqura', day:'numeric', month:'short', year:'numeric'});
  document.getElementById('date-hijri-se').innerText = hijriSv.charAt(0).toUpperCase() + hijriSv.slice(1);

// ===== Progress Ring =====
let ringTotal = 3600; // ثانية
function updateRing(remaining, total) {
  const ring = document.getElementById('progress-ring');
  const circumference = 201.06;
  const ratio = Math.max(0, Math.min(1, remaining / total));
  ring.style.strokeDashoffset = circumference * (1 - ratio);
}

// ===== العد التنازلي =====
let prevTarget = null;
let prevTargetTime = 0;

function updateTimer() {
  const now = new Date();
  const td = getTodayData();
  if (!td) return;

  const activePrayers = prayers.filter(p => p.hasIqama);
  const overlay = document.getElementById('prayer-overlay');

  // إزالة الحالات السابقة
  prayers.forEach(p => {
    const c = document.getElementById('card-' + p.key);
    if (c) c.classList.remove('active-card', 'passed');
  });

  // الصلوات المنقضية
  prayers.forEach(p => {
    const pTime = parseTime(td.Datum, td[p.key]);
    if (now > pTime) {
      const c = document.getElementById('card-' + p.key);
      if (c) c.classList.add('passed');
    }
  });

  let target = null, mode = '', nameAr = '', nameSv = '', foundKey = '', icon = '⏱️';

  for (let p of activePrayers) {
    const pTime = parseTime(td.Datum, td[p.key]);
    const iTime = new Date(pTime.getTime() + (iqamaOffsets[p.key]||0)*60000);
    const endGreen = new Date(iTime.getTime() + 5*60000);

    if (now >= iTime && now < endGreen) {
      overlay.classList.add('show');
      return;
    }
    if (now < pTime) {
      target = pTime; mode = 'اذان'; nameAr = p.ar; nameSv = p.sv; foundKey = p.key; icon = p.icon;
      break;
    }
    if (now < iTime) {
      target = iTime; mode = 'اقامة'; nameAr = p.ar; nameSv = p.sv; foundKey = p.key; icon = p.icon;
      break;
    }
  }

  if (!target) {
    const tomorrow = new Date(); tomorrow.setDate(now.getDate()+1);
    const tmStr = tomorrow.getFullYear()+'-'+String(tomorrow.getMonth()+1).padStart(2,'0')+'-'+String(tomorrow.getDate()).padStart(2,'0')+' 00:00:00';
    const td2 = prayerData.find(d=>d.Datum===tmStr);
    if (td2) {
      target = parseTime(td2.Datum, td2.Fajr);
      mode='اذان'; nameAr='الفجر'; nameSv='Fajr'; foundKey='Fajr'; icon='🌙';
    }
  }

  overlay.classList.remove('show');

  if (foundKey) {
    const c = document.getElementById('card-' + foundKey);
    if (c) { c.classList.remove('passed'); c.classList.add('active-card'); }
  }

  if (target) {
    // تحديث الـ ring total عند تغيير الهدف
    if (target.getTime() !== prevTargetTime) {
      prevTargetTime = target.getTime();
      ringTotal = Math.max(1, Math.floor((target - now) / 1000));
    }

    const diff = target - now;
    const remaining = Math.max(0, Math.floor(diff / 1000));
    const hh = String(Math.floor(diff/3600000)).padStart(2,'0');
    const mm = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    const ss = String(Math.floor((diff%60000)/1000)).padStart(2,'0');

    document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
    document.getElementById('timer-label').innerHTML = mode === 'اذان'
      ? '⏳ المتبقي للأذان &nbsp;<span style="color:var(--text-muted);font-size:0.55rem">Tid till Adhan</span>'
      : '⏳ المتبقي للإقامة &nbsp;<span style="color:var(--text-muted);font-size:0.55rem">Tid till Iqama</span>';
    document.getElementById('timer-prayer').innerHTML = `${nameAr} <span class="countdown-prayer-sv">${nameSv}</span>`;
      document.getElementById('timer-box').className = 'countdown-card' + (mode === 'اقامة' ? ' iqama-mode' : '');

  }
}

function toArabicNum(n) {
  return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function buildAdhkar(list, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  list.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'dhikr-card';
    card.id = `dhikr-${containerId}-${idx}`;
    card.innerHTML = `
      <div class="dhikr-text" style="white-space:pre-line">${item.text}</div>
      <div class="dhikr-footer">
        <div class="dhikr-source">${item.source}</div>
        <div class="dhikr-counter">
          <div class="dhikr-count-display" id="dcnt-${containerId}-${idx}">${toArabicNum(item.max)}</div>
          <div class="dhikr-btn" id="dbtn-${containerId}-${idx}"
            onclick="tapDhikr('${containerId}', ${idx}, ${item.max})">+</div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

const dhikrCounts = {};

function tapDhikr(containerId, idx, max) {
  const key = `${containerId}-${idx}`;
  if (!dhikrCounts[key]) dhikrCounts[key] = 0;
  if (dhikrCounts[key] >= max) return;
  dhikrCounts[key]++;
  const remaining = max - dhikrCounts[key];
  const btn = document.getElementById(`dbtn-${containerId}-${idx}`);
  const cnt = document.getElementById(`dcnt-${containerId}-${idx}`);
  const card = document.getElementById(`dhikr-${containerId}-${idx}`);
  if (remaining <= 0) {
    cnt.textContent = '✓';
    btn.textContent = '✓';
    btn.classList.add('done');
    card.classList.add('completed');
  } else {
    cnt.textContent = toArabicNum(remaining);
  }
}

// ===== الإشعارات =====
function loadNotificationsBase64(encoded) {
  try { renderNotifications(JSON.parse(decodeURIComponent(escape(atob(encoded))))); } catch(e) {}
}

function loadNotificationsFromAndroid(jsonStr) {
  try { renderNotifications(JSON.parse(jsonStr)); } catch(e) {}
}

function refreshNotifications() {
  try { renderNotifications(JSON.parse(AndroidBridge.getNotifications())); } catch(e) {}
}

var notifLoadAttempts = 0;
function tryLoadNotifications() {
  notifLoadAttempts++;
  try {
    renderNotifications(JSON.parse(AndroidBridge.getNotifications()));
  } catch(e) {
    if (notifLoadAttempts < 10) setTimeout(tryLoadNotifications, 600);
  }
}

function renderNotifications(list) {
  const container = document.getElementById('notifications-list');
  container.querySelectorAll('.notif-card').forEach(el => el.remove());
  const noEl = document.getElementById('no-notifications');
  const btn = document.getElementById('tab-btn-notifications');
  if (!list || list.length === 0) {
    noEl.style.display = 'block';
    if (btn) btn.textContent = '🔔 إشعارات';
    return;
  }
  noEl.style.display = 'none';
  if (btn) btn.textContent = `🔔 (${list.length})`;
  for (let i = list.length - 1; i >= 0; i--) {
    const n = list[i];
    const card = document.createElement('div');
    card.className = 'notif-card';
    card.innerHTML = `
      <div class="notif-card-title">📢 ${n.title || 'مسجد الخليل'}</div>
      <div class="notif-card-body">${n.body || ''}</div>
      <div class="notif-card-time">🕐 ${n.time || ''}</div>
    `;
    container.appendChild(card);
  }
}

function clearAllNotifications() {
  try { AndroidBridge.clearNotifications(); renderNotifications([]); } catch(e) {}
}
